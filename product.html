<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Товар</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="logo">🛍️ Товар</div>
        <a href="cart.html" class="cart-icon">
            🛒
            <span class="cart-count" style="display: none;">0</span>
        </a>
    </div>

    <div class="product-page" id="product-page">
        <!-- Контент подгрузится из JS -->
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        const product = products.find(p => p.id === productId);
        
        if (!product) {
            window.location.href = 'catalog.html';
        }
        
        let currentImageIndex = 0;
        let selectedSize = product.sizes[0];
        
        function renderProduct() {
            const container = document.getElementById('product-page');
            
            container.innerHTML = `
                <div class="product-gallery">
                    <div class="main-image">
                        <img id="mainImage" src="${product.images[0]}" alt="${product.name}">
                    </div>
                    <div class="thumbnail-list" id="thumbnailList">
                        ${product.images.map((img, idx) => `
                            <div class="thumbnail ${idx === 0 ? 'active' : ''}" onclick="changeImage(${idx})">
                                <img src="${img}" alt="Фото ${idx + 1}">
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="product-details">
                    <h1 class="product-title">${product.name}</h1>
                    <div class="product-price-large">${product.price.toLocaleString()} ₽</div>
                    
                    <div class="product-description">
                        <h3>Описание</h3>
                        <p>${product.description}</p>
                    </div>
                    
                    <div class="size-selector">
                        <h3>Выберите размер</h3>
                        <div class="size-buttons">
                            ${product.sizes.map(size => `
                                <button class="size-btn ${size === selectedSize ? 'active' : ''}" 
                                        onclick="selectSize('${size}')">
                                    ${size}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="quantity-selector">
                        <h3>Количество</h3>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="changeQuantity(-1)">-</button>
                            <span class="quantity" id="quantity">1</span>
                            <button class="qty-btn" onclick="changeQuantity(1)">+</button>
                        </div>
                    </div>
                    
                    <button class="btn-add-to-cart" onclick="addToCartHandler()">
                        🛒 Добавить в корзину
                    </button>
                </div>
            `;
        }
        
        function changeImage(index) {
            currentImageIndex = index;
            document.getElementById('mainImage').src = product.images[index];
            
            const thumbnails = document.querySelectorAll('.thumbnail');
            thumbnails.forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
        }
        
        function selectSize(size) {
            selectedSize = size;
            const sizeBtns = document.querySelectorAll('.size-btn');
            sizeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.textContent === size);
            });
        }
        
        let quantity = 1;
        function changeQuantity(delta) {
            quantity = Math.max(1, quantity + delta);
            document.getElementById('quantity').textContent = quantity;
        }
        
        function addToCartHandler() {
            addToCart(product.id, selectedSize, quantity);
            
            // Визуальная обратная связь
            const btn = document.querySelector('.btn-add-to-cart');
            btn.textContent = '✓ Добавлено!';
            btn.style.background = '#4caf50';
            
            setTimeout(() => {
                btn.textContent = '🛒 Добавить в корзину';
                btn.style.background = '';
            }, 1500);
            
            // Вибрация (если поддерживается)
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }
        
        renderProduct();
        updateCartCounter();
        
        // Делаем функции глобальными
        window.changeImage = changeImage;
        window.selectSize = selectSize;
        window.changeQuantity = changeQuantity;
        window.addToCartHandler = addToCartHandler;
    </script>
</body>
</html>

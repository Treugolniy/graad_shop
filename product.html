<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GRAAD | Товар</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Шрифт Bebas Neue Cyrillic -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', -apple-system, sans-serif;
            background: #000000;
            color: #E6E6E6;
            min-height: 100vh;
        }

        /* ========== ХЕДЕР СО СТЕКЛОМ ========== */
        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .back-btn:active {
            opacity: 0.7;
        }

        .logo-icon {
            height: 28px;
            width: auto;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logo-icon:active {
            opacity: 0.7;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            position: relative;
        }

        .icon-btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .icon-btn:active {
            opacity: 0.7;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #8A1538;
            color: #E6E6E6;
            font-size: 11px;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            font-family: monospace;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .product-page {
            padding-top: 80px;
            padding-bottom: 100px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ========== ГАЛЕРЕЯ ========== */
        .product-gallery {
            padding: 0 16px;
            margin-bottom: 24px;
        }

        .main-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 16px;
        }

        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }

        .thumbnail-list::-webkit-scrollbar {
            height: 3px;
        }

        .thumbnail-list::-webkit-scrollbar-track {
            background: rgba(230, 230, 230, 0.1);
            border-radius: 10px;
        }

        .thumbnail-list::-webkit-scrollbar-thumb {
            background: #8A1538;
            border-radius: 10px;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.2s ease;
            flex-shrink: 0;
            border: 2px solid transparent;
        }

        .thumbnail.active {
            opacity: 1;
            border-color: #8A1538;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail:active {
            transform: scale(0.95);
        }

        /* ========== ИНФОРМАЦИЯ О ТОВАРЕ ========== */
        .product-details {
            padding: 0 20px;
        }

        .product-title {
            font-size: 36px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #E6E6E6;
        }

        .product-price-large {
            font-size: 32px;
            font-weight: 400;
            color: #8A1538;
            margin-bottom: 24px;
        }

        .product-description {
            margin-bottom: 24px;
        }

        .product-description h3 {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: rgba(230, 230, 230, 0.8);
        }

        .product-description p {
            font-size: 16px;
            line-height: 1.5;
            color: rgba(230, 230, 230, 0.7);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ========== ВЫБОР РАЗМЕРА ========== */
        .size-selector {
            margin-bottom: 24px;
        }

        .size-selector h3 {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: rgba(230, 230, 230, 0.8);
        }

        .size-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .size-btn {
            min-width: 56px;
            padding: 10px 0;
            border-radius: 60px;
            background: rgba(230, 230, 230, 0.1);
            border: none;
            font-size: 16px;
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: #E6E6E6;
            transition: all 0.2s ease;
            text-align: center;
        }

        .size-btn.active {
            background: #8A1538;
            color: #E6E6E6;
        }

        .size-btn:active {
            transform: scale(0.96);
        }

        /* ========== ВЫБОР КОЛИЧЕСТВА ========== */
        .quantity-selector {
            margin-bottom: 32px;
        }

        .quantity-selector h3 {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: rgba(230, 230, 230, 0.8);
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .qty-btn {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: rgba(230, 230, 230, 0.1);
            border: none;
            font-size: 24px;
            font-weight: 400;
            cursor: pointer;
            color: #E6E6E6;
            transition: all 0.2s ease;
        }

        .qty-btn:active {
            transform: scale(0.96);
            background: rgba(230, 230, 230, 0.2);
        }

        .quantity {
            font-size: 24px;
            font-weight: 400;
            min-width: 40px;
            text-align: center;
            color: #E6E6E6;
        }

        /* ========== КНОПКА В КОРЗИНУ ========== */
        .btn-add-to-cart {
            width: 100%;
            padding: 16px;
            background: #8A1538;
            color: #E6E6E6;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn-add-to-cart:active {
            transform: scale(0.97);
            background: #6d0f2c;
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 480px) {
            .glass-header {
                padding: 12px 16px;
            }
            
            .logo-icon {
                height: 24px;
            }
            
            .back-btn img,
            .icon-btn img {
                width: 22px;
                height: 22px;
            }
            
            .product-page {
                padding-top: 70px;
                padding-bottom: 80px;
            }
            
            .product-title {
                font-size: 28px;
            }
            
            .product-price-large {
                font-size: 26px;
            }
            
            .thumbnail {
                width: 65px;
                height: 65px;
                border-radius: 12px;
            }
            
            .product-details {
                padding: 0 16px;
            }
            
            .btn-add-to-cart {
                padding: 14px;
                font-size: 18px;
            }
        }

        @media (max-width: 380px) {
            .size-btn {
                min-width: 48px;
                padding: 8px 0;
                font-size: 14px;
            }
            
            .qty-btn {
                width: 38px;
                height: 38px;
                font-size: 20px;
            }
            
            .quantity {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Хедер со стеклом -->
    <header class="glass-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">
                <img src="arrow-back.svg" alt="Назад" onerror="this.style.display='none'; this.outerHTML='←'">
            </button>
            <img src="logo.svg" alt="GRΛD" class="logo-icon" id="logoBtn">
        </div>
        <div class="header-right">
            <button class="icon-btn" id="menuBtn">
                <img src="menu.svg" alt="Меню">
            </button>
            <button class="icon-btn" id="cartBtn">
                <img src="cart.svg" alt="Корзина">
                <span class="cart-count" style="display: none;">0</span>
            </button>
        </div>
    </header>

    <div class="product-page" id="product-page">
        <!-- Контент подгрузится из JS -->
    </div>

    <script src="data.js"></script>
    <script>
        // ========== ФУНКЦИИ КОРЗИНЫ ==========
        function getCart() {
            const cart = localStorage.getItem('cart');
            return cart ? JSON.parse(cart) : [];
        }
        
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function updateCartCounter() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const counters = document.querySelectorAll('.cart-count');
            counters.forEach(counter => {
                if (totalItems > 0) {
                    counter.textContent = totalItems;
                    counter.style.display = 'flex';
                } else {
                    counter.style.display = 'none';
                }
            });
        }
        
        function addToCartGlobal(productId, size, quantity) {
            const cart = getCart();
            const existingItem = cart.find(item => item.id === productId && item.size === size);
            
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    size: size,
                    quantity: quantity,
                    image: product.images[0]
                });
            }
            
            saveCart(cart);
            updateCartCounter();
        }
        
        // ========== ПОЛУЧАЕМ ТОВАР ==========
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        const product = products.find(p => p.id === productId);
        
        if (!product) {
            window.location.href = 'catalog.html';
        }
        
        let currentImageIndex = 0;
        let selectedSize = product.sizes[0];
        let quantity = 1;
        
        // ========== РЕНДЕР СТРАНИЦЫ ==========
        function renderProduct() {
            const container = document.getElementById('product-page');
            
            container.innerHTML = `
                <div class="product-gallery">
                    <div class="main-image">
                        <img id="mainImage" src="${product.images[0]}" alt="${product.name}">
                    </div>
                    <div class="thumbnail-list" id="thumbnailList">
                        ${product.images.map((img, idx) => `
                            <div class="thumbnail ${idx === 0 ? 'active' : ''}" onclick="changeImage(${idx})">
                                <img src="${img}" alt="Фото ${idx + 1}">
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="product-details">
                    <h1 class="product-title">${product.name}</h1>
                    <div class="product-price-large">${product.price.toLocaleString()} ₽</div>
                    
                    <div class="product-description">
                        <h3>ОПИСАНИЕ</h3>
                        <p>${product.description}</p>
                    </div>
                    
                    <div class="size-selector">
                        <h3>ВЫБЕРИТЕ РАЗМЕР</h3>
                        <div class="size-buttons">
                            ${product.sizes.map(size => `
                                <button class="size-btn ${size === selectedSize ? 'active' : ''}" 
                                        onclick="selectSize('${size}')">
                                    ${size}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="quantity-selector">
                        <h3>КОЛИЧЕСТВО</h3>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="changeQuantity(-1)">−</button>
                            <span class="quantity" id="quantity">${quantity}</span>
                            <button class="qty-btn" onclick="changeQuantity(1)">+</button>
                        </div>
                    </div>
                    
                    <button class="btn-add-to-cart" onclick="addToCartHandler()">
                        В КОРЗИНУ
                    </button>
                </div>
            `;
        }
        
        // ========== ФУНКЦИИ ВЗАИМОДЕЙСТВИЯ ==========
        function changeImage(index) {
            currentImageIndex = index;
            document.getElementById('mainImage').src = product.images[index];
            
            const thumbnails = document.querySelectorAll('.thumbnail');
            thumbnails.forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
        }
        
        function selectSize(size) {
            selectedSize = size;
            const sizeBtns = document.querySelectorAll('.size-btn');
            sizeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.textContent === size);
            });
        }
        
        function changeQuantity(delta) {
            quantity = Math.max(1, quantity + delta);
            document.getElementById('quantity').textContent = quantity;
        }
        
        function addToCartHandler() {
            addToCartGlobal(product.id, selectedSize, quantity);
            
            // Визуальная обратная связь
            const btn = document.querySelector('.btn-add-to-cart');
            const originalText = btn.textContent;
            btn.textContent = '✓ ДОБАВЛЕНО!';
            btn.style.background = '#4caf50';
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '#8A1538';
            }, 1500);
            
            // Показываем уведомление
            showAddedFeedback();
            
            // Вибрация
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        }
        
        function showAddedFeedback() {
            const feedback = document.createElement('div');
            feedback.textContent = '✓ Товар добавлен в корзину';
            feedback.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: #8A1538;
                color: #E6E6E6;
                padding: 10px 24px;
                border-radius: 60px;
                font-size: 14px;
                font-family: 'Bebas Neue Cyrillic', sans-serif;
                z-index: 200;
                animation: fadeOut 1.5s ease forwards;
            `;
            
            if (!document.querySelector('#feedbackStyle')) {
                const style = document.createElement('style');
                style.id = 'feedbackStyle';
                style.textContent = `
                    @keyframes fadeOut {
                        0% { opacity: 1; transform: translateX(-50%) translateY(0); }
                        70% { opacity: 1; }
                        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 1500);
        }
        
        // ========== TELEGRAM INIT ==========
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
            
            const backButton = tg.BackButton;
            if (backButton) {
                backButton.onClick(() => {
                    window.history.back();
                });
            }
        }
        
        // ========== ОБРАБОТЧИКИ КНОПОК ==========
        document.getElementById('cartBtn')?.addEventListener('click', () => {
            window.location.href = 'cart.html';
        });
        
        document.getElementById('menuBtn')?.addEventListener('click', () => {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'Меню',
                    message: 'Навигация появится скоро',
                    buttons: [{type: 'close'}]
                });
            }
        });
        
        // КЛИК ПО ЛОГОТИПУ — ВОЗВРАТ НА ГЛАВНУЮ
        document.getElementById('logoBtn')?.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // ========== ЗАПУСК ==========
        renderProduct();
        updateCartCounter();
        
        // Делаем функции глобальными для onclick
        window.changeImage = changeImage;
        window.selectSize = selectSize;
        window.changeQuantity = changeQuantity;
        window.addToCartHandler = addToCartHandler;
        
        console.log('✅ Карточка товара загружена');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GRAAD | Товар</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Дополнительные стили для кнопок размеров */
        .size-btn {
            min-width: 56px;
            padding: 10px 0;
            border-radius: 60px;
            background: rgba(230, 230, 230, 0.1);
            border: none;
            font-size: 16px;
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: #E6E6E6;
            transition: all 0.2s ease;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .size-btn.active {
            background: #8A1538 !important;
            color: #E6E6E6 !important;
        }
        
        .size-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <!-- Бургер-меню -->
    <div class="burger-menu" id="burgerMenu">
        <div class="burger-overlay" id="burgerOverlay"></div>
        <div class="burger-panel">
            <div class="burger-header">
                <img src="logo.svg" alt="GRAAD" class="burger-logo">
                <button class="burger-close" id="burgerClose">✕</button>
            </div>
            <nav class="burger-nav">
                <a href="index.html" class="burger-link">Главная</a>
                <a href="catalog.html" class="burger-link">Каталог</a>
                <a href="about.html" class="burger-link">О нас</a>
                <a href="new.html" class="burger-link">Новинки</a>
                <a href="sales.html" class="burger-link">Скидки</a>
                <a href="support.html" class="burger-link">Поддержка</a>
                <a href="game.html" class="burger-link">Получить скидку!</a>
            </nav>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-left">
            <img src="logo.svg" alt="GRAAD" class="logo-icon" id="logoBtn">
        </div>
        <div class="header-right">
            <button class="icon-btn" id="cartBtn">
                <img src="cart.svg" alt="Корзина">
                <span class="cart-count" style="display: none;">0</span>
            </button>
            <button class="burger-btn" id="burgerBtn">
                <img src="menu.svg" alt="Меню">
            </button>
        </div>
    </header>

    <div class="product-page" id="product-page">
        <!-- Контент подгрузится из JS -->
    </div>

    <script src="data.js"></script>
    <script src="config.js"></script>
    <script>
        // Получаем ID товара из URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        const product = products.find(p => p.id === productId);
        
        if (!product) {
            window.location.href = 'catalog.html';
        }
        
        let currentImageIndex = 0;
        let selectedSize = product.sizes[0];
        let quantity = 1;
        
        // Бургер-меню
        const burgerBtn = document.getElementById('burgerBtn');
        const burgerMenu = document.getElementById('burgerMenu');
        const burgerOverlay = document.getElementById('burgerOverlay');
        const burgerClose = document.getElementById('burgerClose');
        
        function openBurger() {
            burgerMenu.classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        
        function closeBurger() {
            burgerMenu.classList.remove('open');
            document.body.style.overflow = '';
        }
        
        if (burgerBtn) burgerBtn.addEventListener('click', openBurger);
        if (burgerOverlay) burgerOverlay.addEventListener('click', closeBurger);
        if (burgerClose) burgerClose.addEventListener('click', closeBurger);
        
        // Пункты меню (кроме основных ссылок)
        document.getElementById('gameLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            closeBurger();
            window.location.href = 'game.html';
        });
        
        // Функции корзины
        function getCart() {
            const cart = localStorage.getItem('cart');
            return cart ? JSON.parse(cart) : [];
        }
        
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function updateCartCounter() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const counters = document.querySelectorAll('.cart-count');
            counters.forEach(counter => {
                if (totalItems > 0) {
                    counter.textContent = totalItems;
                    counter.style.display = 'flex';
                } else {
                    counter.style.display = 'none';
                }
            });
        }
        
        function addToCartGlobal(productId, size, quantity) {
            const cart = getCart();
            const existingItem = cart.find(item => item.id === productId && item.size === size);
            
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    size: size,
                    quantity: quantity,
                    image: product.images[0]
                });
            }
            
            saveCart(cart);
            updateCartCounter();
        }
        
        function showAddedFeedback() {
            const feedback = document.createElement('div');
            feedback.textContent = '✓ Товар добавлен в корзину';
            feedback.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: #8A1538;
                color: #E6E6E6;
                padding: 10px 24px;
                border-radius: 60px;
                font-size: 14px;
                font-family: 'Bebas Neue Cyrillic', sans-serif;
                z-index: 200;
                animation: fadeOut 1.5s ease forwards;
            `;
            
            if (!document.querySelector('#feedbackStyle')) {
                const style = document.createElement('style');
                style.id = 'feedbackStyle';
                style.textContent = `
                    @keyframes fadeOut {
                        0% { opacity: 1; transform: translateX(-50%) translateY(0); }
                        70% { opacity: 1; }
                        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 1500);
        }
        
        // Рендер страницы товара
        function renderProduct() {
            const container = document.getElementById('product-page');
            
            container.innerHTML = `
                <div class="product-gallery">
                    <div class="main-image">
                        <img id="mainImage" src="${product.images[0]}" alt="${product.name}">
                    </div>
                    <div class="thumbnail-list" id="thumbnailList">
                        ${product.images.map((img, idx) => `
                            <div class="thumbnail ${idx === 0 ? 'active' : ''}" onclick="changeImage(${idx})">
                                <img src="${img}" alt="Фото ${idx + 1}">
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="product-details">
                    <h1 class="product-title">${product.name}</h1>
                    <div class="product-price-large">${product.price.toLocaleString()} ₽</div>
                    
                    <div class="product-description">
                        <h3>ОПИСАНИЕ</h3>
                        <p>${product.description}</p>
                    </div>
                    
                    <div class="size-selector">
                        <h3>ВЫБЕРИТЕ РАЗМЕР</h3>
                        <div class="size-buttons" id="sizeButtons">
                            ${product.sizes.map(size => `
                                <button class="size-btn ${size === selectedSize ? 'active' : ''}" data-size="${size}">
                                    ${size}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="quantity-selector">
                        <h3>КОЛИЧЕСТВО</h3>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="changeQuantity(-1)">−</button>
                            <span class="quantity" id="quantity">${quantity}</span>
                            <button class="qty-btn" onclick="changeQuantity(1)">+</button>
                        </div>
                    </div>
                    
                    <button class="btn-add-to-cart" onclick="addToCartHandler()">
                        В КОРЗИНУ
                    </button>
                </div>
            `;
            
            // Добавляем обработчики для кнопок размеров
            const sizeBtns = document.querySelectorAll('.size-btn');
            sizeBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    // Убираем active у всех
                    sizeBtns.forEach(b => b.classList.remove('active'));
                    // Добавляем active на нажатую
                    this.classList.add('active');
                    // Обновляем selectedSize
                    selectedSize = this.textContent;
                    console.log('Выбран размер:', selectedSize);
                });
            });
        }
        
        // Функции взаимодействия
        window.changeImage = function(index) {
            currentImageIndex = index;
            document.getElementById('mainImage').src = product.images[index];
            
            const thumbnails = document.querySelectorAll('.thumbnail');
            thumbnails.forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
        };
        
        window.changeQuantity = function(delta) {
            quantity = Math.max(1, quantity + delta);
            document.getElementById('quantity').textContent = quantity;
        };
        
        window.addToCartHandler = function() {
            addToCartGlobal(product.id, selectedSize, quantity);
            
            // Визуальная обратная связь
            const btn = document.querySelector('.btn-add-to-cart');
            const originalText = btn.textContent;
            btn.textContent = '✓ ДОБАВЛЕНО!';
            btn.style.background = '#4caf50';
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '#8A1538';
            }, 1500);
            
            showAddedFeedback();
            
            // Вибрация
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        };
        
        // Telegram инициализация
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
            
            const backButton = tg.BackButton;
            if (backButton) {
                backButton.onClick(() => {
                    window.history.back();
                });
            }
        }
        
        // Обработчики кнопок
        document.getElementById('cartBtn')?.addEventListener('click', () => {
            window.location.href = 'cart.html';
        });
        
        // Клик по логотипу — возврат на главную
        document.getElementById('logoBtn')?.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // Запуск
        renderProduct();
        updateCartCounter();
        
        console.log('✅ Карточка товара загружена');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GRAAD | Главная</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<style>
    /* Запрет прокрутки всей страницы */
    html, body {
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
    }
    
    /* Контент может прокручиваться внутри */
    .main-content {
        overflow-y: auto;
        height: 100%;
        -webkit-overflow-scrolling: touch;
    }
    
    /* Скрываем скроллбар (опционально) */
    .main-content::-webkit-scrollbar {
        width: 0;
        background: transparent;
    }
</style>
<body>
    <!-- Бургер-меню (боковая панель) -->
    <div class="burger-menu" id="burgerMenu">
        <div class="burger-overlay" id="burgerOverlay"></div>
        <div class="burger-panel">
            <div class="burger-header">
                <img src="logo.svg" alt="GRAAD" class="burger-logo">
                <button class="burger-close" id="burgerClose">✕</button>
            </div>
            <nav class="burger-nav">
                <a href="index.html" class="burger-link">Главная</a>
                <a href="catalog.html" class="burger-link">Каталог</a>
                <a href="about.html" class="burger-link">О нас</a>
                <a href="new.html" class="burger-link">Новинки</a>
                <a href="sales.html" class="burger-link">Скидки</a>
                <a href="support.html" class="burger-link">Поддержка</a>
                <a href="game.html" class="burger-link">Получить скидку!</a>
            </nav>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-left">
            <img src="logo.svg" alt="GRAAD" class="logo-icon" id="logoBtn">
        </div>
        <div class="header-right">
            <button class="icon-btn" id="cartBtn">
                <img src="cart.svg" alt="Корзина">
                <span class="cart-count" style="display: none;">0</span>
            </button>
            <button class="burger-btn" id="burgerBtn">
                <img src="menu.svg" alt="Меню">
            </button>
        </div>
    </header>

    <!-- Анимационный экран загрузки (сплеш) -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-container">
            <div class="splash-sun" id="splashSun">
                <img src="sun.svg" alt="Sun">
            </div>
            <div class="splash-text" id="splashText">
                <img src="text.svg" alt="GRAAD">
            </div>
        </div>
    </div>

    <!-- Основной контент (изначально скрыт) -->
    <main class="main-content hidden" id="mainContent">
        <!-- Фоновый слайдер во весь экран -->
        <div class="fullscreen-slider" id="fullscreenSlider">
            <div class="slider-slide active" style="background-image: url('1.jpg')"></div>
            <div class="slider-slide" style="background-image: url('2.jpg')"></div>
            <div class="slider-slide" style="background-image: url('3.jpg')"></div>
            <div class="slider-slide" style="background-image: url('4.jpg')"></div>
            <div class="slider-overlay"></div>
        </div>

        <!-- Контент поверх слайдера -->
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">
                Одежда с<br>брянским духом
            </h1>
            
            <div class="hero-buttons" id="heroButtons">
                <a href="catalog.html" class="btn btn-primary">Каталог</a>
                <a href="https://t.me/your_channel" target="_blank" class="btn btn-outline">Telegram-канал</a>
            </div>
        </div>

        <!-- Нижние иконки соцсетей -->
        <div class="social-icons" id="socialIcons">
            <a href="https://t.me/graad32" class="social-link"><img src="telegram.svg" alt="Telegram"></a>
            <a href="https://www.tiktok.com/@graad32" class="social-link"><img src="tiktok.svg" alt="TikTok"></a>
            <a href="#" class="social-link"><img src="instagram.svg" alt="Instagram"></a>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // Бургер-меню
        const burgerBtn = document.getElementById('burgerBtn');
        const burgerMenu = document.getElementById('burgerMenu');
        const burgerOverlay = document.getElementById('burgerOverlay');
        const burgerClose = document.getElementById('burgerClose');
        
        function openBurger() {
            burgerMenu.classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        
        function closeBurger() {
            burgerMenu.classList.remove('open');
            document.body.style.overflow = '';
        }
        
        burgerBtn?.addEventListener('click', openBurger);
        burgerOverlay?.addEventListener('click', closeBurger);
        burgerClose?.addEventListener('click', closeBurger);
        
        // Корзина
        document.getElementById('cartBtn')?.addEventListener('click', () => {
            window.location.href = 'cart.html';
        });
        
        // Логотип на главную (уже на главной, но оставим)
        document.getElementById('logoBtn')?.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // sessionStorage — анимация показывается при каждом новом запуске приложения
        const hasSeenAnimation = sessionStorage.getItem('grad_splash_shown');
        
        if (!hasSeenAnimation) {
            sessionStorage.setItem('grad_splash_shown', 'true');
        } else {
            const splashScreen = document.getElementById('splashScreen');
            const mainContent = document.getElementById('mainContent');
            
            if (splashScreen && mainContent) {
                splashScreen.style.display = 'none';
                mainContent.classList.remove('hidden');
                document.body.classList.add('has-slider');
                
                if (typeof startBackgroundSlider === 'function') {
                    startBackgroundSlider();
                }
                
                setTimeout(() => {
                    const heroTitle = document.getElementById('heroTitle');
                    const heroButtons = document.getElementById('heroButtons');
                    const socialIcons = document.getElementById('socialIcons');
                    
                    if (heroTitle) heroTitle.classList.add('visible');
                    if (heroButtons) heroButtons.classList.add('visible');
                    if (socialIcons) socialIcons.classList.add('visible');
                }, 100);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GRΛD | Корзина</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header class="glass-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">
                <img src="arrow-back.svg" alt="Назад" onerror="this.style.display='none'; this.outerHTML='←'">
            </button>
            <img src="logo.svg" alt="GRΛD" class="logo-icon" id="logoBtn">
        </div>
        <div class="header-right">
            <button class="icon-btn" id="menuBtn">
                <img src="menu.svg" alt="Меню">
            </button>
            <button class="icon-btn" id="cartBtn">
                <img src="cart.svg" alt="Корзина">
                <span class="cart-count" style="display: none;">0</span>
            </button>
        </div>
    </header>

    <div class="cart-container">
        <div id="cart-items" class="cart-items">
            <!-- Товары в корзине -->
        </div>
        
        <div id="empty-cart" class="empty-cart" style="display: none;">
            <div class="empty-cart-icon">🛒</div>
            <h3>КОРЗИНА ПУСТА</h3>
            <p>Добавьте товары из каталога</p>
            <a href="catalog.html" class="btn-primary">В КАТАЛОГ</a>
        </div>
        
        <div id="cart-summary" class="cart-summary" style="display: none;">
            <div class="summary-row">
                <span>ТОВАРОВ:</span>
                <span id="total-items">0</span>
            </div>
            <div class="summary-row total">
                <span>ИТОГО:</span>
                <span id="total-price">0 ₽</span>
            </div>
            <button class="btn-checkout" id="checkout-btn">
                ОФОРМИТЬ ЗАКАЗ
            </button>
            <p class="checkout-note">Оплата будет добавлена позже</p>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // Функции корзины (если не определены в script.js)
        function getCart() {
            const cart = localStorage.getItem('cart');
            return cart ? JSON.parse(cart) : [];
        }
        
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function updateCartCounter() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const counters = document.querySelectorAll('.cart-count');
            counters.forEach(counter => {
                if (totalItems > 0) {
                    counter.textContent = totalItems;
                    counter.style.display = 'flex';
                } else {
                    counter.style.display = 'none';
                }
            });
        }
        
        function getCartTotal() {
            const cart = getCart();
            return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
        }
        
        function removeFromCart(productId, size) {
            let cart = getCart();
            cart = cart.filter(item => !(item.id === productId && item.size === size));
            saveCart(cart);
            updateCartCounter();
            renderCart();
        }
        
        function updateQuantity(productId, size, newQuantity) {
            const cart = getCart();
            const item = cart.find(item => item.id === productId && item.size === size);
            if (item && newQuantity > 0) {
                item.quantity = newQuantity;
                saveCart(cart);
                updateCartCounter();
                renderCart();
            } else if (newQuantity <= 0) {
                removeFromCart(productId, size);
            }
        }
        
        // Рендер корзины
        function renderCart() {
            const cart = getCart();
            const cartItemsDiv = document.getElementById('cart-items');
            const emptyCartDiv = document.getElementById('empty-cart');
            const summaryDiv = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                cartItemsDiv.style.display = 'none';
                emptyCartDiv.style.display = 'flex';
                summaryDiv.style.display = 'none';
                return;
            }
            
            cartItemsDiv.style.display = 'block';
            emptyCartDiv.style.display = 'none';
            summaryDiv.style.display = 'block';
            
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}" class="cart-item-image" onerror="this.src='https://placehold.co/400/333333/E6E6E6?text=GRΛD'">
                    <div class="cart-item-details">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-size">Размер: ${item.size}</div>
                        <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                    </div>
                    <div class="cart-item-actions">
                        <div class="cart-quantity">
                            <button class="cart-qty-btn" onclick="updateQty(${item.id}, '${item.size}', ${item.quantity - 1})">−</button>
                            <span>${item.quantity}</span>
                            <button class="cart-qty-btn" onclick="updateQty(${item.id}, '${item.size}', ${item.quantity + 1})">+</button>
                        </div>
                        <button class="cart-remove-btn" onclick="removeItem(${item.id}, '${item.size}')">🗑</button>
                    </div>
                </div>
            `).join('');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = getCartTotal();
            
            document.getElementById('total-items').textContent = totalItems;
            document.getElementById('total-price').textContent = totalPrice.toLocaleString() + ' ₽';
        }
        
        function updateQty(id, size, newQty) {
            if (newQty <= 0) {
                removeItem(id, size);
            } else {
                updateQuantity(id, size, newQty);
            }
        }
        
        function removeItem(id, size) {
            removeFromCart(id, size);
        }
        
        // Telegram инициализация
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
            
            const backButton = tg.BackButton;
            if (backButton) {
                backButton.onClick(() => {
                    window.history.back();
                });
            }
        }
        
        // Обработчики кнопок
        document.getElementById('cartBtn')?.addEventListener('click', () => {
            renderCart();
        });
        
        document.getElementById('menuBtn')?.addEventListener('click', () => {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'Меню',
                    message: 'Навигация появится скоро',
                    buttons: [{type: 'close'}]
                });
            }
        });
        
        // Клик по логотипу — возврат на главную
        document.getElementById('logoBtn')?.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // Кнопка оформления заказа
        document.getElementById('checkout-btn')?.addEventListener('click', () => {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'ℹ️',
                    message: 'Оплата будет добавлена в следующей версии',
                    buttons: [{type: 'ok'}]
                });
            } else {
                alert('Оплата будет добавлена позже!');
            }
        });
        
        // Запуск
        renderCart();
        updateCartCounter();
        
        // Делаем функции глобальными для onclick
        window.updateQty = updateQty;
        window.removeItem = removeItem;
        
        console.log('✅ Корзина загружена');
    </script>
</body>
</html>

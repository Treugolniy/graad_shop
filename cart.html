<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GRAAD | Корзина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Шрифт Bebas Neue Cyrillic -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', -apple-system, sans-serif;
            background: #000000;
            color: #E6E6E6;
            min-height: 100vh;
        }

        /* ========== ХЕДЕР СО СТЕКЛОМ ========== */
        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .back-btn:active {
            opacity: 0.7;
        }

        .logo-icon {
            height: 28px;
            width: auto;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logo-icon:active {
            opacity: 0.7;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            position: relative;
        }

        .icon-btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .icon-btn:active {
            opacity: 0.7;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #8A1538;
            color: #E6E6E6;
            font-size: 11px;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            font-family: monospace;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .cart-container {
            padding-top: 80px;
            padding-bottom: 30px;
            min-height: 100vh;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ========== ТОВАРЫ В КОРЗИНЕ ========== */
        .cart-items {
            padding: 0 16px;
        }

        .cart-item {
            display: flex;
            gap: 14px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: #E6E6E6;
        }

        .cart-item-size {
            font-size: 13px;
            color: rgba(230, 230, 230, 0.6);
            margin-bottom: 4px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .cart-item-price {
            font-size: 20px;
            font-weight: 400;
            color: #8A1538;
        }

        .cart-item-actions {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
        }

        .cart-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(230, 230, 230, 0.1);
            border-radius: 30px;
            padding: 4px 8px;
        }

        .cart-qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 30px;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #E6E6E6;
            transition: all 0.2s ease;
        }

        .cart-qty-btn:active {
            transform: scale(0.9);
            background: rgba(230, 230, 230, 0.1);
        }

        .cart-quantity span {
            font-size: 16px;
            min-width: 24px;
            text-align: center;
            color: #E6E6E6;
        }

        .cart-remove-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s ease;
            color: #E6E6E6;
        }

        .cart-remove-btn:active {
            opacity: 1;
            transform: scale(0.9);
        }

        /* ========== ПУСТАЯ КОРЗИНА ========== */
        .empty-cart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .empty-cart-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-cart h3 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #E6E6E6;
        }

        .empty-cart p {
            font-size: 16px;
            color: rgba(230, 230, 230, 0.6);
            margin-bottom: 30px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .btn-primary {
            display: inline-block;
            padding: 14px 36px;
            background: #8A1538;
            color: #E6E6E6;
            text-decoration: none;
            border-radius: 60px;
            font-size: 16px;
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-primary:active {
            transform: scale(0.96);
            background: #6d0f2c;
        }

        /* ========== ИТОГО ========== */
        .cart-summary {
            padding: 20px 16px;
            margin: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 18px;
            color: rgba(230, 230, 230, 0.8);
        }

        .summary-row.total {
            font-size: 22px;
            font-weight: 400;
            border-top: 1px solid rgba(230, 230, 230, 0.2);
            margin-top: 8px;
            padding-top: 14px;
            color: #E6E6E6;
        }

        .summary-row.total span:last-child {
            color: #8A1538;
        }

        .btn-checkout {
            width: 100%;
            padding: 16px;
            background: #8A1538;
            color: #E6E6E6;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
        }

        .btn-checkout:active {
            transform: scale(0.97);
            background: #6d0f2c;
        }

        .checkout-note {
            text-align: center;
            font-size: 12px;
            color: rgba(230, 230, 230, 0.5);
            margin-top: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 480px) {
            .glass-header {
                padding: 12px 16px;
            }
            
            .logo-icon {
                height: 24px;
            }
            
            .back-btn img,
            .icon-btn img {
                width: 22px;
                height: 22px;
            }
            
            .cart-container {
                padding-top: 70px;
            }
            
            .cart-item {
                padding: 12px;
                gap: 12px;
            }
            
            .cart-item-image {
                width: 65px;
                height: 65px;
                border-radius: 12px;
            }
            
            .cart-item-title {
                font-size: 16px;
            }
            
            .cart-item-price {
                font-size: 18px;
            }
            
            .cart-quantity {
                gap: 6px;
                padding: 3px 6px;
            }
            
            .cart-qty-btn {
                width: 26px;
                height: 26px;
                font-size: 16px;
            }
            
            .empty-cart h3 {
                font-size: 24px;
            }
            
            .summary-row {
                font-size: 16px;
            }
            
            .summary-row.total {
                font-size: 20px;
            }
            
            .btn-checkout {
                padding: 14px;
                font-size: 18px;
            }
        }

        @media (max-width: 380px) {
            .cart-item-image {
                width: 55px;
                height: 55px;
            }
            
            .cart-item-title {
                font-size: 14px;
            }
            
            .cart-item-price {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Хедер со стеклом -->
    <header class="glass-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">
                <img src="arrow-back.svg" alt="Назад" onerror="this.style.display='none'; this.outerHTML='←'">
            </button>
            <img src="logo.svg" alt="GRΛD" class="logo-icon" id="logoBtn">
        </div>
        <div class="header-right">
            <button class="icon-btn" id="menuBtn">
                <img src="menu.svg" alt="Меню">
            </button>
            <button class="icon-btn" id="cartBtn">
                <img src="cart.svg" alt="Корзина">
                <span class="cart-count" style="display: none;">0</span>
            </button>
        </div>
    </header>

    <div class="cart-container">
        <div id="cart-items" class="cart-items">
            <!-- Товары в корзине -->
        </div>
        
        <div id="empty-cart" class="empty-cart" style="display: none;">
            <div class="empty-cart-icon">🛒</div>
            <h3>КОРЗИНА ПУСТА</h3>
            <p>Добавьте товары из каталога</p>
            <a href="catalog.html" class="btn-primary">В КАТАЛОГ</a>
        </div>
        
        <div id="cart-summary" class="cart-summary" style="display: none;">
            <div class="summary-row">
                <span>ТОВАРОВ:</span>
                <span id="total-items">0</span>
            </div>
            <div class="summary-row total">
                <span>ИТОГО:</span>
                <span id="total-price">0 ₽</span>
            </div>
            <button class="btn-checkout" id="checkout-btn">
                ОФОРМИТЬ ЗАКАЗ
            </button>
            <p class="checkout-note">Оплата будет добавлена позже</p>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // ========== ФУНКЦИИ КОРЗИНЫ ==========
        function getCart() {
            const cart = localStorage.getItem('cart');
            return cart ? JSON.parse(cart) : [];
        }
        
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function updateCartCounter() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const counters = document.querySelectorAll('.cart-count');
            counters.forEach(counter => {
                if (totalItems > 0) {
                    counter.textContent = totalItems;
                    counter.style.display = 'flex';
                } else {
                    counter.style.display = 'none';
                }
            });
        }
        
        function getCartTotal() {
            const cart = getCart();
            return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
        }
        
        function removeFromCart(productId, size) {
            let cart = getCart();
            cart = cart.filter(item => !(item.id === productId && item.size === size));
            saveCart(cart);
            updateCartCounter();
            renderCart();
        }
        
        function updateQuantity(productId, size, newQuantity) {
            const cart = getCart();
            const item = cart.find(item => item.id === productId && item.size === size);
            if (item && newQuantity > 0) {
                item.quantity = newQuantity;
                saveCart(cart);
                updateCartCounter();
                renderCart();
            } else if (newQuantity <= 0) {
                removeFromCart(productId, size);
            }
        }
        
        // ========== РЕНДЕР КОРЗИНЫ ==========
        function renderCart() {
            const cart = getCart();
            const cartItemsDiv = document.getElementById('cart-items');
            const emptyCartDiv = document.getElementById('empty-cart');
            const summaryDiv = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                cartItemsDiv.style.display = 'none';
                emptyCartDiv.style.display = 'flex';
                summaryDiv.style.display = 'none';
                return;
            }
            
            cartItemsDiv.style.display = 'block';
            emptyCartDiv.style.display = 'none';
            summaryDiv.style.display = 'block';
            
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}" class="cart-item-image" onerror="this.src='https://placehold.co/400/333333/E6E6E6?text=GRΛD'">
                    <div class="cart-item-details">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-size">Размер: ${item.size}</div>
                        <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                    </div>
                    <div class="cart-item-actions">
                        <div class="cart-quantity">
                            <button class="cart-qty-btn" onclick="updateQty(${item.id}, '${item.size}', ${item.quantity - 1})">−</button>
                            <span>${item.quantity}</span>
                            <button class="cart-qty-btn" onclick="updateQty(${item.id}, '${item.size}', ${item.quantity + 1})">+</button>
                        </div>
                        <button class="cart-remove-btn" onclick="removeItem(${item.id}, '${item.size}')">🗑</button>
                    </div>
                </div>
            `).join('');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = getCartTotal();
            
            document.getElementById('total-items').textContent = totalItems;
            document.getElementById('total-price').textContent = totalPrice.toLocaleString() + ' ₽';
        }
        
        function updateQty(id, size, newQty) {
            if (newQty <= 0) {
                removeItem(id, size);
            } else {
                updateQuantity(id, size, newQty);
            }
        }
        
        function removeItem(id, size) {
            removeFromCart(id, size);
        }
        
        // ========== TELEGRAM INIT ==========
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
            
            const backButton = tg.BackButton;
            if (backButton) {
                backButton.onClick(() => {
                    window.history.back();
                });
            }
        }
        
        // ========== ОБРАБОТЧИКИ КНОПОК ==========
        document.getElementById('cartBtn')?.addEventListener('click', () => {
            // Уже в корзине, просто обновляем
            renderCart();
        });
        
        document.getElementById('menuBtn')?.addEventListener('click', () => {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'Меню',
                    message: 'Навигация появится скоро',
                    buttons: [{type: 'close'}]
                });
            }
        });
        
        // КЛИК ПО ЛОГОТИПУ — ВОЗВРАТ НА ГЛАВНУЮ
        document.getElementById('logoBtn')?.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // КНОПКА ОФОРМЛЕНИЯ
        document.getElementById('checkout-btn')?.addEventListener('click', () => {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'ℹ️',
                    message: 'Оплата будет добавлена в следующей версии',
                    buttons: [{type: 'ok'}]
                });
            } else {
                alert('Оплата будет добавлена позже!');
            }
        });
        
        // ========== ЗАПУСК ==========
        renderCart();
        updateCartCounter();
        
        // Делаем функции глобальными для onclick
        window.updateQty = updateQty;
        window.removeItem = removeItem;
        
        console.log('✅ Корзина загружена');
    </script>
</body>
</html>

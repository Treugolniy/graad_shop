<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GRΛD | Каталог</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Шрифт Bebas Neue Cyrillic -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', -apple-system, sans-serif;
            background: #000000;
            color: #E6E6E6;
            min-height: 100vh;
        }

        /* ========== ХЕДЕР СО СТЕКЛОМ ========== */
        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .back-btn:active {
            opacity: 0.7;
        }

        .logo-icon {
            height: 28px;
            width: auto;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logo-icon:active {
            opacity: 0.7;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            position: relative;
        }

        .icon-btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .icon-btn:active {
            opacity: 0.7;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #8A1538;
            color: #E6E6E6;
            font-size: 11px;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            font-family: monospace;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .catalog-container {
            padding-top: 80px;
            padding-bottom: 30px;
            min-height: 100vh;
        }

        .catalog-header {
            padding: 20px 20px 16px;
        }

        .catalog-header h1 {
            font-size: 36px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #E6E6E6;
        }

        /* ========== ФИЛЬТРЫ ========== */
        .category-filter {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }

        .category-filter::-webkit-scrollbar {
            height: 3px;
        }

        .category-filter::-webkit-scrollbar-track {
            background: rgba(230, 230, 230, 0.1);
            border-radius: 10px;
        }

        .category-filter::-webkit-scrollbar-thumb {
            background: #8A1538;
            border-radius: 10px;
        }

        .filter-btn {
            padding: 8px 24px;
            border-radius: 60px;
            background: rgba(230, 230, 230, 0.1);
            border: none;
            font-size: 16px;
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: #E6E6E6;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: #8A1538;
            color: #E6E6E6;
        }

        .filter-btn:active {
            transform: scale(0.96);
        }

        /* ========== СЕТКА ТОВАРОВ ========== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 0 16px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .product-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.08);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:active .product-image img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 14px 12px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: #E6E6E6;
        }

        .product-price {
            font-size: 20px;
            font-weight: 400;
            color: #8A1538;
            margin-bottom: 10px;
        }

        .btn-quick-add {
            width: 100%;
            padding: 10px;
            background: #8A1538;
            color: #E6E6E6;
            border: none;
            border-radius: 60px;
            font-size: 14px;
            font-family: 'Bebas Neue Cyrillic', 'Bebas Neue', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-quick-add:active {
            transform: scale(0.96);
            background: #6d0f2c;
        }

        /* ========== ПУСТОЕ СОСТОЯНИЕ ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1/-1;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 20px;
            color: rgba(230, 230, 230, 0.6);
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 480px) {
            .glass-header {
                padding: 12px 16px;
            }
            
            .logo-icon {
                height: 24px;
            }
            
            .back-btn img,
            .icon-btn img {
                width: 22px;
                height: 22px;
            }
            
            .catalog-container {
                padding-top: 70px;
            }
            
            .catalog-header {
                padding: 16px 16px 12px;
            }
            
            .catalog-header h1 {
                font-size: 28px;
            }
            
            .filter-btn {
                padding: 6px 20px;
                font-size: 14px;
            }
            
            .products-grid {
                gap: 12px;
                padding: 0 12px;
            }
            
            .product-name {
                font-size: 16px;
            }
            
            .product-price {
                font-size: 18px;
            }
            
            .btn-quick-add {
                padding: 8px;
                font-size: 13px;
            }
        }

        @media (max-width: 380px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            
            .product-info {
                padding: 10px 8px;
            }
            
            .product-name {
                font-size: 14px;
            }
            
            .product-price {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Хедер со стеклом -->
    <header class="glass-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">
                <img src="arrow-back.svg" alt="Назад" onerror="this.style.display='none'; this.outerHTML='←'">
            </button>
            <img src="logo.svg" alt="GRΛD" class="logo-icon" id="logoBtn">
        </div>
        <div class="header-right">
            <button class="icon-btn" id="menuBtn">
                <img src="menu.svg" alt="Меню">
            </button>
            <button class="icon-btn" id="cartBtn">
                <img src="cart.svg" alt="Корзина">
                <span class="cart-count" style="display: none;">0</span>
            </button>
        </div>
    </header>

    <div class="catalog-container">
        <div class="catalog-header">
            <h1>КАТАЛОГ</h1>
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">ВСЕ</button>
                <button class="filter-btn" data-category="одежда">ОДЕЖДА</button>
                <button class="filter-btn" data-category="аксессуары">АКСЕССУАРЫ</button>
            </div>
        </div>
        
        <div class="products-grid" id="products-grid">
            <div class="empty-state">
                <div class="empty-state-icon">🔄</div>
                <div class="empty-state-text">Загрузка товаров...</div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // ========== ФУНКЦИИ КОРЗИНЫ ==========
        function getCart() {
            const cart = localStorage.getItem('cart');
            return cart ? JSON.parse(cart) : [];
        }
        
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function updateCartCounter() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const counters = document.querySelectorAll('.cart-count');
            counters.forEach(counter => {
                if (totalItems > 0) {
                    counter.textContent = totalItems;
                    counter.style.display = 'flex';
                } else {
                    counter.style.display = 'none';
                }
            });
        }
        
        function addToCart(productId, size) {
            const cart = getCart();
            const existingItem = cart.find(item => item.id === productId && item.size === size);
            
            let product = null;
            if (typeof products !== 'undefined' && products.length > 0) {
                product = products.find(p => p.id === productId);
            }
            
            if (!product) return;
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    size: size,
                    quantity: 1,
                    image: product.images[0]
                });
            }
            
            saveCart(cart);
            updateCartCounter();
            showAddedFeedback();
        }
        
        function showAddedFeedback() {
            const feedback = document.createElement('div');
            feedback.textContent = '✓ Товар добавлен';
            feedback.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: #8A1538;
                color: #E6E6E6;
                padding: 10px 24px;
                border-radius: 60px;
                font-size: 14px;
                font-family: 'Bebas Neue Cyrillic', sans-serif;
                z-index: 200;
                animation: fadeOut 1.5s ease forwards;
            `;
            
            if (!document.querySelector('#feedbackStyle')) {
                const style = document.createElement('style');
                style.id = 'feedbackStyle';
                style.textContent = `
                    @keyframes fadeOut {
                        0% { opacity: 1; transform: translateX(-50%) translateY(0); }
                        70% { opacity: 1; }
                        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 1500);
        }
        
        // ========== РЕНДЕР КАТАЛОГА ==========
        function renderCatalog(category = 'all') {
            const grid = document.getElementById('products-grid');
            
            if (typeof products === 'undefined' || !products.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <div class="empty-state-text">Товары не найдены</div>
                    </div>
                `;
                return;
            }
            
            let filteredProducts = products;
            if (category !== 'all') {
                filteredProducts = products.filter(p => p.category === category);
            }
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">Нет товаров в этой категории</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card" onclick="window.location.href='product.html?id=${product.id}'">
                    <div class="product-image">
                        <img src="${product.images[0]}" alt="${product.name}" onerror="this.src='https://placehold.co/600x400/333333/E6E6E6?text=GRΛD'">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">${product.price.toLocaleString()} ₽</p>
                        <button class="btn-quick-add" onclick="event.stopPropagation(); addToCart(${product.id}, '${product.sizes[0]}')">
                            В КОРЗИНУ
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== ФИЛЬТРАЦИЯ ==========
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCatalog(btn.dataset.category);
            });
        });
        
        // ========== TELEGRAM INIT ==========
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
            
            const backButton = tg.BackButton;
            if (backButton) {
                backButton.onClick(() => {
                    window.history.back();
                });
            }
        }
        
        // ========== ОБРАБОТЧИКИ КНОПОК ==========
        document.getElementById('cartBtn')?.addEventListener('click', () => {
            window.location.href = 'cart.html';
        });
        
        document.getElementById('menuBtn')?.addEventListener('click', () => {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'Меню',
                    message: 'Навигация появится скоро',
                    buttons: [{type: 'close'}]
                });
            }
        });
        
        // КЛИК ПО ЛОГОТИПУ — ВОЗВРАТ НА ГЛАВНУЮ
        document.getElementById('logoBtn')?.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // ========== ЗАПУСК ==========
        renderCatalog();
        updateCartCounter();
        
        console.log('✅ Каталог загружен');
    </script>
</body>
</html>

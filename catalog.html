<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GRAAD | Каталог</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Бургер-меню (боковая панель) -->
    <div class="burger-menu" id="burgerMenu">
        <div class="burger-overlay" id="burgerOverlay"></div>
        <div class="burger-panel">
            <div class="burger-header">
                <img src="logo.svg" alt="GRAAD" class="burger-logo">
                <button class="burger-close" id="burgerClose">✕</button>
            </div>
            <nav class="burger-nav">
                <a href="index.html" class="burger-link">Главная</a>
                <a href="catalog.html" class="burger-link">Каталог</a>
                <a href="about.html" class="burger-link">О нас</a>
                <a href="new.html" class="burger-link">Новинки</a>
                <a href="sales.html" class="burger-link">Скидки</a>
                <a href="support.html" class="burger-link">Поддержка</a>
                <a href="game.html" class="burger-link">Получить скидку!</a>
            </nav>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-left">
            <img src="logo.svg" alt="GRAAD" class="logo-icon" id="logoBtn">
        </div>
        <div class="header-right">
            <button class="icon-btn" id="cartBtn">
                <img src="cart.svg" alt="Корзина">
                <span class="cart-count" style="display: none;">0</span>
            </button>
            <button class="burger-btn" id="burgerBtn">
                <img src="menu.svg" alt="Меню">
            </button>
        </div>
    </header>

    <div class="catalog-container">
        <div class="catalog-header">
            <h1>КАТАЛОГ</h1>
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">ВСЕ</button>
                <button class="filter-btn" data-category="одежда">ОДЕЖДА</button>
                <button class="filter-btn" data-category="аксессуары">АКСЕССУАРЫ</button>
            </div>
        </div>
        
        <div class="products-grid" id="products-grid">
            <div class="empty-state">
                <div class="empty-state-icon">🔄</div>
                <div class="empty-state-text">Загрузка товаров...</div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // Бургер-меню
        const burgerBtn = document.getElementById('burgerBtn');
        const burgerMenu = document.getElementById('burgerMenu');
        const burgerOverlay = document.getElementById('burgerOverlay');
        const burgerClose = document.getElementById('burgerClose');
        
        function openBurger() {
            burgerMenu.classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        
        function closeBurger() {
            burgerMenu.classList.remove('open');
            document.body.style.overflow = '';
        }
        
        if (burgerBtn) {
            burgerBtn.addEventListener('click', openBurger);
        }
        if (burgerOverlay) burgerOverlay?.addEventListener('click', closeBurger);
        if (burgerClose) burgerClose?.addEventListener('click', closeBurger);
        
        // Обработчики для пунктов меню
        document.getElementById('aboutLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            closeBurger();
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'О нас',
                    message: 'GRD — одежда с брянским духом. Стиль, качество, индивидуальность.',
                    buttons: [{type: 'ok'}]
                });
            }
        });
        
        document.getElementById('newLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            closeBurger();
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'Новинки',
                    message: 'Скоро здесь появятся новые коллекции! Следите за обновлениями.',
                    buttons: [{type: 'ok'}]
                });
            }
        });
        
        document.getElementById('salesLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            closeBurger();
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'Скидки',
                    message: 'Подпишитесь на наш Telegram-канал, чтобы первыми узнавать о скидках!',
                    buttons: [{type: 'ok'}]
                });
            }
        });
        
        document.getElementById('supportLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            closeBurger();
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: 'Поддержка',
                    message: 'Свяжитесь с нами: support@grad.ru или в Telegram @grad_support',
                    buttons: [{type: 'ok'}]
                });
            }
        });
        
        document.getElementById('gameLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            closeBurger();
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showPopup({
                    title: '🎮 Мини-игра',
                    message: 'Игры появятся в следующем обновлении!',
                    buttons: [{type: 'ok'}]
                });
            }
        });
        
        // Функции корзины
        function getCart() {
            const cart = localStorage.getItem('cart');
            return cart ? JSON.parse(cart) : [];
        }
        
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function updateCartCounter() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const counters = document.querySelectorAll('.cart-count');
            counters.forEach(counter => {
                if (totalItems > 0) {
                    counter.textContent = totalItems;
                    counter.style.display = 'flex';
                } else {
                    counter.style.display = 'none';
                }
            });
        }
        
        function addToCart(productId, size) {
            const cart = getCart();
            const existingItem = cart.find(item => item.id === productId && item.size === size);
            
            let product = null;
            if (typeof products !== 'undefined' && products.length > 0) {
                product = products.find(p => p.id === productId);
            }
            
            if (!product) return;
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    size: size,
                    quantity: 1,
                    image: product.images[0]
                });
            }
            
            saveCart(cart);
            updateCartCounter();
            showAddedFeedback();
        }
        
        function showAddedFeedback() {
            const feedback = document.createElement('div');
            feedback.textContent = '✓ Товар добавлен';
            feedback.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: #8A1538;
                color: #E6E6E6;
                padding: 10px 24px;
                border-radius: 60px;
                font-size: 14px;
                font-family: 'Bebas Neue Cyrillic', sans-serif;
                z-index: 200;
                animation: fadeOut 1.5s ease forwards;
            `;
            
            if (!document.querySelector('#feedbackStyle')) {
                const style = document.createElement('style');
                style.id = 'feedbackStyle';
                style.textContent = `
                    @keyframes fadeOut {
                        0% { opacity: 1; transform: translateX(-50%) translateY(0); }
                        70% { opacity: 1; }
                        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 1500);
        }
        
        // Рендер каталога
        function renderCatalog(category = 'all') {
            const grid = document.getElementById('products-grid');
            
            if (typeof products === 'undefined' || !products.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <div class="empty-state-text">Товары не найдены</div>
                    </div>
                `;
                return;
            }
            
            let filteredProducts = products;
            if (category !== 'all') {
                filteredProducts = products.filter(p => p.category === category);
            }
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">Нет товаров в этой категории</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card" onclick="window.location.href='product.html?id=${product.id}'">
                    <div class="product-image">
                        <img src="${product.images[0]}" alt="${product.name}" onerror="this.src='https://placehold.co/600x400/333333/E6E6E6?text=GRAAD'">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">${product.price.toLocaleString()} ₽</p>
                        <button class="btn-quick-add" onclick="event.stopPropagation(); addToCart(${product.id}, '${product.sizes[0]}')">
                            В КОРЗИНУ
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // Фильтрация
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCatalog(btn.dataset.category);
            });
        });
        
        // Telegram инициализация
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
            
            const backButton = tg.BackButton;
            if (backButton) {
                backButton.onClick(() => {
                    window.history.back();
                });
            }
        }
        
        // Обработчики кнопок
        document.getElementById('cartBtn')?.addEventListener('click', () => {
            window.location.href = 'cart.html';
        });
        
        // Клик по логотипу — возврат на главную
        document.getElementById('logoBtn')?.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // Запуск
        renderCatalog();
        updateCartCounter();
        
        console.log('✅ Каталог загружен');
    </script>
</body>
</html>
